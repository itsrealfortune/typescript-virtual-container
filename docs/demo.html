<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Virtual Shell — Web Demo</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        height: 100%;
        margin: 0;
      }

      body {
        display: flex;
        flex-direction: column;
        font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
        font-size: 14px;
        line-height: 1.5;
        background: #0b0f14;
        color: #e6eef6;
      }

      #terminal {
        flex: 1;
        overflow-y: auto;
        padding: 12px 16px;
        cursor: text;
        user-select: text;
      }

      #output {
        white-space: pre-wrap;
        word-break: break-all;
        user-select: text;
      }

      #output span,
      #output .input-line {
        user-select: text;
      }

      /* Hidden input — keystroke sink only */
      #cmd {
        position: fixed;
        left: -9999px;
        opacity: 0;
        width: 1px;
        height: 1px;
        pointer-events: none;
      }

      .cursor {
        display: inline-block;
        min-width: 0.6em;
        background: #e6eef6;
        color: #0b0f14;
        animation: blink 1s step-start infinite;
        pointer-events: none;
        user-select: none;
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }
    </style>
  </head>
  <body>
    <div id="terminal">
      <div id="output"></div>
    </div>
    <input id="cmd" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
    <script type="module" src="./app.js"></script>
  </body>
</html>
