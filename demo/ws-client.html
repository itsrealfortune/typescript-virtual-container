<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WebSocket Terminal</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #1a1a2e; color: #e0e0e0; font-family: 'Courier New', monospace; }
#terminal-wrapper { display: flex; flex-direction: column; height: 100%; }
#scrollback { overflow-y: hidden; flex-shrink: 0; }
#terminal-wrapper.fullscreen #scrollback { display: none; }
#terminal { flex: 1; overflow-y: auto; white-space: pre; padding: 4px; outline: none; caret-color: transparent; cursor: text; font-size: 14px; line-height: 1.2; }
#terminal-wrapper.fullscreen #terminal { height: 100%; }
#connect-bar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #16213e; border-bottom: 1px solid #0f3460; font-size: 13px; }
#connect-bar input { background: #0f3460; color: #e0e0e0; border: 1px solid #533483; padding: 4px 8px; font-family: inherit; font-size: inherit; border-radius: 3px; }
#connect-bar input:focus { outline: none; border-color: #e94560; }
#connect-bar button { background: #533483; color: #e0e0e0; border: none; padding: 4px 14px; border-radius: 3px; cursor: pointer; font-family: inherit; }
#connect-bar button:hover { background: #e94560; }
#connect-bar label { color: #a0a0b0; }
#status { margin-left: auto; font-size: 12px; }
.status-connected { color: #4ecca3; }
.status-disconnected { color: #e94560; }
.status-connecting { color: #ffc107; }
</style>
</head>
<body>
<div id="terminal-wrapper">
	<div id="connect-bar">
		<label>ws://</label>
		<input id="host-input" value="localhost:8080" />
		<label>user</label>
		<input id="user-input" value="websocket" size="10" />
		<label>token</label>
		<input id="token-input" type="password" size="10" />
		<button id="connect-btn">Connect</button>
		<span id="status" class="status-disconnected">Disconnected</span>
	</div>
	<div id="scrollback"></div>
	<pre id="terminal" tabindex="0"></pre>
</div>

<script type="module">
const WS_PORT = 8080;

function measureCharCell(terminal) {
	const probe = document.createElement("span");
	probe.style.cssText = "position:absolute;visibility:hidden;white-space:pre;";
	probe.textContent = "X";
	terminal.appendChild(probe);
	const rect = probe.getBoundingClientRect();
	terminal.removeChild(probe);
	return { w: rect.width || 8, h: rect.height || 16 };
}

function getTermSize(terminal) {
	const { w, h } = measureCharCell(terminal);
	const wrapper = document.getElementById("terminal-wrapper");
	return {
		cols: Math.max(1, Math.floor(terminal.clientWidth / w)),
		rows: Math.max(1, Math.floor(wrapper.clientHeight / h)),
	};
}

// Minimal VT100 renderer — mirrors WebTermRenderer
class WebTermRenderer {
	constructor(rows, cols) {
		this.rows = rows;
		this.cols = cols;
		this.buffer = Array.from({ length: rows }, () => Array(cols).fill(" "));
		this.attrs = Array.from({ length: rows }, () => Array(cols).fill(null));
		this.cursorRow = 0;
		this.cursorCol = 0;
		this.scrollback = [];
		this.scrollbackMax = 1000;
		this._cleared = false;
		this._bold = false;
		this._fg = null;
		this._bg = null;
		this._queue = "";
	}

	write(data) {
		for (const ch of data) {
			if (this._queue) {
				this._queue += ch;
				if (ch === "~") {
					this._handleCSI();
					this._queue = "";
				}
				continue;
			}
			if (ch === "\x1b") { this._queue = ch; continue; }
			if (ch === "\r") { this.cursorCol = 0; continue; }
			if (ch === "\n") { this._newline(); continue; }
			if (ch === "\b") { this.cursorCol = Math.max(0, this.cursorCol - 1); continue; }
			if (ch === "\t") { this.cursorCol = Math.min(this.cols - 1, this.cursorCol + 4); continue; }
			if (ch === "\x07") continue;
			if (ch === "\x0b" || ch === "\x0c") continue;
			this._putChar(ch);
		}
	}

	_newline() {
		if (this.cursorRow + 1 >= this.rows) {
			this.scrollback.push(this.buffer[0].join(""));
			if (this.scrollback.length > this.scrollbackMax) this.scrollback.shift();
			this.buffer.shift();
			this.attrs.shift();
			this.buffer.push(Array(this.cols).fill(" "));
			this.attrs.push(Array(this.cols).fill(null));
		} else {
			this.cursorRow++;
		}
		this.cursorCol = 0;
	}

	_putChar(ch) {
		if (this.cursorCol >= this.cols) {
			this._newline();
		}
		if (this.cursorRow < this.rows && this.cursorCol < this.cols) {
			this.buffer[this.cursorRow][this.cursorCol] = ch;
			this.attrs[this.cursorRow][this.cursorCol] = { bold: this._bold, fg: this._fg, bg: this._bg };
		}
		this.cursorCol++;
	}

	_handleCSI() {
		const seq = this._queue.slice(1, -1);
		this._queue = "";
		const match = seq.match(/^\[(\d+(?:;\d+)*)([A-HJKLMlhm])$/);
		if (!match) return;
		const params = match[1].split(";").map(Number);
		const cmd = match[2];
		switch (cmd) {
			case "H":
				this.cursorRow = Math.max(0, (params[0] || 1) - 1);
				this.cursorCol = Math.max(0, (params[1] || 1) - 1);
				break;
			case "J":
				if (params[0] === 2 || params.length === 0) {
					this._cleared = true;
					for (let r = 0; r < this.rows; r++) {
						for (let c = 0; c < this.cols; c++) { this.buffer[r][c] = " "; this.attrs[r][c] = null; }
					}
				}
				break;
			case "K":
				for (let c = this.cursorCol; c < this.cols; c++) { this.buffer[this.cursorRow][c] = " "; this.attrs[this.cursorRow][c] = null; }
				break;
			case "A": this.cursorRow = Math.max(0, this.cursorRow - (params[0] || 1)); break;
			case "B": this.cursorRow = Math.min(this.rows - 1, this.cursorRow + (params[0] || 1)); break;
			case "C": this.cursorCol = Math.min(this.cols - 1, this.cursorCol + (params[0] || 1)); break;
			case "D": this.cursorCol = Math.max(0, this.cursorCol - (params[0] || 1)); break;
			case "l": if (params[0] === 25) break; break;
			case "h": break;
			case "m": this._handleSGR(params); break;
		}
	}

	_handleSGR(params) {
		if (params.length === 0) { this._bold = false; this._fg = null; this._bg = null; return; }
		for (let i = 0; i < params.length; i++) {
			const p = params[i];
			if (p === 0) { this._bold = false; this._fg = null; this._bg = null; }
			else if (p === 1) this._bold = true;
			else if (p === 22) this._bold = false;
			else if (p >= 30 && p <= 37) this._fg = p - 30;
			else if (p >= 90 && p <= 97) this._fg = p - 82;
			else if (p >= 40 && p <= 47) this._bg = p - 40;
			else if (p >= 100 && p <= 107) this._bg = p - 92;
			else if (p === 38 && params[i + 1] === 5) { this._fg = params[i + 2]; i += 2; }
			else if (p === 48 && params[i + 1] === 5) { this._bg = params[i + 2]; i += 2; }
			else if (p === 39) this._fg = null;
			else if (p === 49) this._bg = null;
		}
	}

	resize(rows, cols) {
		const newBuf = Array.from({ length: rows }, () => Array(cols).fill(" "));
		const newAttrs = Array.from({ length: rows }, () => Array(cols).fill(null));
		for (let r = 0; r < Math.min(this.rows, rows); r++) {
			for (let c = 0; c < Math.min(this.cols, cols); c++) {
				newBuf[r][c] = this.buffer[r][c] || " ";
				newAttrs[r][c] = this.attrs[r][c] || null;
			}
		}
		this.rows = rows; this.cols = cols;
		this.buffer = newBuf; this.attrs = newAttrs;
		if (this.cursorRow >= rows) this.cursorRow = rows - 1;
		if (this.cursorCol >= cols) this.cursorCol = cols - 1;
	}

	renderHtml() {
		let html = "";
		for (let r = 0; r < this.rows; r++) {
			let line = "";
			let spanOpen = false;
			for (let c = 0; c < this.cols; c++) {
				const ch = this.buffer[r][c] || " ";
				const attr = this.attrs[r][c];
				if (ch === "&" || ch === "<" || ch === ">") {
					// close span, write entity, reopen
					if (spanOpen) { html += "</span>"; spanOpen = false; }
					html += ch === "&" ? "&amp;" : ch === "<" ? "&lt;" : "&gt;";
					continue;
				}
				if (!spanOpen) {
					const style = attr ? this._style(attr) : "";
					html += `<span${style ? ` style="${style}"` : ""}>`;
					spanOpen = true;
				}
				html += ch;
			}
			if (spanOpen) html += "</span>";
			if (r < this.rows - 1) html += "\n";
		}
		return html;
	}

	renderScrollbackHtml() {
		return this.scrollback.map(l => l.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") + "\n").join("");
	}

	_style(attr) {
		const parts = [];
		if (attr.bold) parts.push("font-weight:bold");
		if (attr.fg !== null) {
			const colors = ["#000","#c00","#0c0","#cc0","#00c","#c0c","#0cc","#ccc","#888","#f00","#0f0","#ff0","#00f","#f0f","#0ff","#fff"];
			parts.push(`color:${colors[attr.fg] || "#ccc"}`);
		}
		if (attr.bg !== null) {
			const colors = ["#000","#800","#080","#880","#008","#808","#088","#888","#444","#c44","#4c4","#cc4","#44c","#c4c","#4cc","#ccc"];
			parts.push(`background:${colors[attr.bg] || "#000"}`);
		}
		return parts.join(";");
	}

	consumeCleared() { const c = this._cleared; this._cleared = false; return c; }
	clearScrollback() { this.scrollback = []; }
	get scrollbackLength() { return this.scrollback.length; }
}

// ── Main ──

const terminalEl = document.getElementById("terminal");
const scrollbackEl = document.getElementById("scrollback");
const wrapper = document.getElementById("terminal-wrapper");
const statusEl = document.getElementById("status");
const connectBtn = document.getElementById("connect-btn");
const hostInput = document.getElementById("host-input");
const userInput = document.getElementById("user-input");
const tokenInput = document.getElementById("token-input");

let ws = null;
let renderer = null;
let fullscreenMode = false;

function setStatus(text, cls) {
	statusEl.textContent = text;
	statusEl.className = cls;
}

function flush() {
	const cleared = renderer.consumeCleared();
	if (cleared) fullscreenMode = true;
	scrollbackEl.innerHTML = renderer.renderScrollbackHtml();
	terminalEl.innerHTML = renderer.renderHtml();
	if (fullscreenMode) {
		renderer.clearScrollback();
		scrollbackEl.innerHTML = "";
		if (!cleared && renderer.scrollbackLength > 0) {
			fullscreenMode = false;
			wrapper.classList.remove("fullscreen");
		} else {
			wrapper.classList.add("fullscreen");
		}
	} else {
		wrapper.classList.remove("fullscreen");
	}
	terminalEl.scrollIntoView(false);
}

function connect() {
	if (ws) ws.close();
	const host = hostInput.value || "localhost:8080";
	const user = userInput.value || "websocket";
	const token = tokenInput.value || "";
	const { cols, rows } = getTermSize(terminalEl);
	renderer = new WebTermRenderer(rows, cols);

	const url = `ws://${host}/?user=${encodeURIComponent(user)}${token ? `&token=${encodeURIComponent(token)}` : ""}&cols=${cols}&rows=${rows}`;
	setStatus("Connecting...", "status-connecting");

	ws = new WebSocket(url);

	ws.onopen = () => {
		setStatus("Connected", "status-connected");
		terminalEl.focus();
	};

	ws.onmessage = (event) => {
		try {
			const msg = JSON.parse(event.data);
			switch (msg.type) {
				case "data":
					renderer.write(msg.data);
					flush();
					break;
				case "pong":
					break;
				case "exit":
					ws.close();
					break;
				case "error":
					console.error("Server error:", msg.message);
					break;
			}
		} catch {
			// raw data fallback
			renderer.write(event.data);
			flush();
		}
	};

	ws.onclose = () => {
		setStatus("Disconnected", "status-disconnected");
		ws = null;
	};

	ws.onerror = () => {
		setStatus("Connection error", "status-disconnected");
	};
}

function disconnect() {
	if (ws) {
		ws.send(JSON.stringify({ type: "exit", code: 0 }));
		ws.close();
		ws = null;
	}
	setStatus("Disconnected", "status-disconnected");
}

function sendData(data) {
	if (ws && ws.readyState === WebSocket.OPEN) {
		ws.send(JSON.stringify({ type: "data", data }));
	}
}

function sendResize() {
	if (ws && ws.readyState === WebSocket.OPEN) {
		const { cols, rows } = getTermSize(terminalEl);
		renderer.resize(rows, cols);
		ws.send(JSON.stringify({ type: "resize", cols, rows }));
		flush();
	}
}

function sendPing() {
	if (ws && ws.readyState === WebSocket.OPEN) {
		ws.send(JSON.stringify({ type: "ping" }));
	}
}

// Ping every 30s
setInterval(sendPing, 30000);

// Keyboard input
terminalEl.addEventListener("keydown", (e) => {
	if (e.ctrlKey && e.key === "c") { sendData("\x03"); e.preventDefault(); return; }
	if (e.ctrlKey && e.key === "d") { sendData("\x04"); e.preventDefault(); return; }
	if (e.ctrlKey && e.key === "l") { sendData("\x0c"); e.preventDefault(); return; }
	if (e.ctrlKey && e.key === "z") { sendData("\x1a"); e.preventDefault(); return; }
	if (e.ctrlKey && e.key === "u") { sendData("\x15"); e.preventDefault(); return; }
	if (e.key === "Enter") { sendData("\r"); e.preventDefault(); return; }
	if (e.key === "Backspace") { sendData("\x7f"); e.preventDefault(); return; }
	if (e.key === "Tab") { sendData("\t"); e.preventDefault(); return; }
	if (e.key === "Escape") { sendData("\x1b"); e.preventDefault(); return; }
	if (e.key === "ArrowUp") { sendData("\x1b[A"); e.preventDefault(); return; }
	if (e.key === "ArrowDown") { sendData("\x1b[B"); e.preventDefault(); return; }
	if (e.key === "ArrowRight") { sendData("\x1b[C"); e.preventDefault(); return; }
	if (e.key === "ArrowLeft") { sendData("\x1b[D"); e.preventDefault(); return; }
	if (e.key === "Home") { sendData("\x1b[H"); e.preventDefault(); return; }
	if (e.key === "End") { sendData("\x1b[F"); e.preventDefault(); return; }
	if (e.ctrlKey) return;
	if (e.key.length === 1) {
		sendData(e.key);
		e.preventDefault();
	}
});

terminalEl.addEventListener("paste", (e) => {
	e.preventDefault();
	const text = e.clipboardData?.getData("text/plain") ?? "";
	sendData(text);
});

// Resize handler
let resizeTimer = null;
window.addEventListener("resize", () => {
	clearTimeout(resizeTimer);
	resizeTimer = setTimeout(sendResize, 200);
});

// Connect button
connectBtn.addEventListener("click", () => {
	if (ws) disconnect();
	else connect();
});

// Enter in host/user/token connects
for (const input of [hostInput, userInput, tokenInput]) {
	input.addEventListener("keydown", (e) => {
		if (e.key === "Enter") connect();
	});
}

// Auto-connect on page load
connect();
</script>
</body>
</html>
