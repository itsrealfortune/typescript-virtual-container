<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Virtual Shell — Web Demo</title>
    <meta name="description" content="Scalable Linux shell emulator running entirely in the browser — virtual filesystem, SSH/SFTP, apt, and a full command set." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Virtual Shell — Web Demo" />
    <meta property="og:description" content="Scalable Linux shell emulator running entirely in the browser — virtual filesystem, SSH/SFTP, apt, and a full command set." />
    <meta property="og:url" content="https://itsrealfortune.github.io/typescript-virtual-container/demo.html" />
    <meta property="og:image" content="https://itsrealfortune.fr/avatar.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Virtual Shell — Web Demo" />
    <meta name="twitter:description" content="Scalable Linux shell emulator running entirely in the browser — virtual filesystem, SSH/SFTP, apt, and a full command set." />
    <meta name="twitter:image" content="https://itsrealfortune.fr/avatar.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; overflow: hidden; }
      body {
        background: #0b0f14;
        font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace;
        font-size: 14px;
        line-height: 1.4;
      }
      #terminal-wrapper {
        position: fixed;
        inset: 0;
        overflow-y: auto;
        overflow-x: hidden;
        background: #0b0f14;
        cursor: text;
      }
      #terminal-wrapper.fullscreen {
        overflow: hidden;
      }
      #terminal-wrapper.fullscreen #scrollback {
        display: none;
      }
      #terminal-wrapper.fullscreen #terminal {
        position: fixed;
        inset: 0;
        overflow: hidden;
      }
      #scrollback, #terminal {
        margin: 0;
        padding: 0;
        background: transparent;
        color: #ccc;
        white-space: pre;
        outline: none;
        font-family: inherit;
        font-size: inherit;
        line-height: inherit;
      }
      #terminal {
        outline: none;
      }

      /* ── Desktop ──────────────────────────────────────── */
      #desktop {
        position: fixed;
        inset: 0;
        display: none;
        background: #1a3a5c;
        font-family: -apple-system, 'Segoe UI', 'Noto Sans', sans-serif;
        font-size: 13px;
        color: #fff;
        overflow: hidden;
        z-index: 1000;
      }

      /* Panel */
      #desktop-panel {
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 30px;
        background: linear-gradient(180deg, #3c3c3c 0%, #2a2a2a 100%);
        border-bottom: 1px solid #1a1a1a;
        display: flex;
        align-items: center;
        padding: 0 4px;
        gap: 2px;
        z-index: 2000;
        user-select: none;
      }
      .xfce-menu-button {
        padding: 2px 10px;
        background: #4a4a4a;
        border-radius: 3px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
        white-space: nowrap;
      }
      .xfce-menu-button:hover { background: #5a5a5a; }
      .xfce-window-list {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 2px;
        margin: 0 8px;
        overflow: hidden;
      }
      .xfce-taskbutton {
        padding: 2px 8px;
        background: #3a3a3a;
        border-radius: 2px;
        cursor: pointer;
        font-size: 11px;
        white-space: nowrap;
        max-width: 150px;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .xfce-taskbutton:hover { background: #4a4a4a; }
      .xfce-taskbutton.active { background: #5a8ccf; color: #fff; }
      .xfce-tray {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0 6px;
        border-left: 1px solid #555;
      }
      .xfce-clock { font-size: 11px; color: #ddd; padding: 2px 4px; }

      /* Applications menu */
      .xfce-menu {
        position: absolute;
        top: 30px;
        left: 4px;
        min-width: 200px;
        background: #3a3a3a;
        border: 1px solid #555;
        border-radius: 4px;
        padding: 4px 0;
        box-shadow: 2px 4px 12px rgba(0,0,0,0.5);
        z-index: 3000;
      }
      .menu-item {
        padding: 6px 16px;
        cursor: pointer;
        color: #eee;
        font-size: 12px;
      }
      .menu-item:hover { background: #5a8ccf; }
      .menu-separator { height: 1px; background: #555; margin: 4px 8px; }

      /* Desktop area */
      #desktop-area {
        position: absolute;
        top: 30px; left: 0; right: 0; bottom: 0;
        padding: 16px;
        display: flex;
        flex-direction: column;
        flex-wrap: wrap;
        align-content: flex-start;
        gap: 8px;
      }
      .desktop-icon {
        width: 80px;
        text-align: center;
        cursor: pointer;
        padding: 8px 4px;
        border-radius: 4px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }
      .desktop-icon:hover { background: rgba(255,255,255,0.12); }
      .desktop-icon span {
        font-size: 11px;
        color: #fff;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        word-wrap: break-word;
        max-width: 72px;
      }
      .desktop-icon-img {
        width: 40px;
        height: 40px;
        background: rgba(255,255,255,0.1);
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
      }
      .term-icon::after  { content: "▸_"; color: #8f8; font-size: 18px; font-weight: bold; }
      .home-icon::after  { content: "🏠"; font-size: 20px; }
      .trash-icon::after { content: "🗑"; font-size: 20px; }

      /* Windows */
      .desktop-window {
        position: absolute;
        min-width: 240px;
        min-height: 120px;
        background: #2a2a2a;
        border: 1px solid #555;
        border-radius: 5px 5px 3px 3px;
        box-shadow: 2px 4px 16px rgba(0,0,0,0.5);
        display: flex;
        flex-direction: column;
      }
      .desktop-window.win-focused {
        border-color: #6a9cf0;
        box-shadow: 2px 4px 20px rgba(90,140,207,0.3);
        z-index: 500;
      }
      .win-header {
        display: flex;
        align-items: center;
        padding: 4px 6px;
        background: linear-gradient(180deg, #4a4a4a, #3a3a3a);
        border-radius: 4px 4px 0 0;
        cursor: default;
        user-select: none;
        flex-shrink: 0;
      }
      .win-focused .win-header {
        background: linear-gradient(180deg, #5a8ccf, #4a7cbf);
      }
      .win-title {
        flex: 1;
        font-size: 12px;
        font-weight: 600;
        color: #eee;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .win-controls {
        display: flex;
        gap: 4px;
        margin-left: 8px;
      }
      .win-controls button {
        width: 18px;
        height: 18px;
        border: none;
        border-radius: 2px;
        cursor: pointer;
        font-size: 11px;
        line-height: 18px;
        text-align: center;
        padding: 0;
        color: #fff;
      }
      .win-min {
        background: #5a5a5a;
      }
      .win-min:hover { background: #7a7a7a; }
      .win-close {
        background: #c44;
      }
      .win-close:hover { background: #e66; }
      .win-content {
        flex: 1;
        overflow: hidden;
        position: relative;
        background: #1a1a1a;
      }
      .win-terminal {
        margin: 0;
        padding: 4px;
        background: transparent;
        color: #ddd;
        white-space: pre;
        outline: none;
        font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace;
        font-size: 13px;
        line-height: 1.3;
        height: 100%;
        overflow: hidden;
        position: absolute;
        inset: 0;
      }

      /* Thunar */
      .thunar-pathbar {
        padding: 6px 8px;
        background: #333;
        font-size: 11px;
        color: #aaa;
        border-bottom: 1px solid #444;
      }
      .thunar-listing {
        padding: 4px;
        overflow-y: auto;
        height: calc(100% - 30px);
      }
      .thunar-entry {
        padding: 3px 6px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .thunar-entry:hover { background: rgba(90,140,207,0.3); }
      .thunar-entry .thunar-icon { font-size: 14px; }
      .thunar-error {
        padding: 16px;
        color: #c66;
        text-align: center;
      }

      /* About dialog */
      .about-dialog {
        padding: 24px;
        text-align: center;
      }
      .about-dialog .about-logo {
        font-size: 48px;
        margin-bottom: 12px;
      }
      .about-dialog h2 {
        margin: 0 0 8px;
        font-size: 16px;
        color: #8cf;
      }
      .about-dialog p {
        margin: 6px 0;
        font-size: 12px;
        color: #aaa;
      }
      .about-dialog .about-close-hint {
        margin-top: 16px;
        font-size: 11px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div id="terminal-wrapper">
      <pre id="scrollback"></pre>
      <pre id="terminal" tabindex="0"></pre>
    </div>
    <div id="desktop"></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
