<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Virtual Shell — Web Demo</title>
    <meta name="description" content="Scalable Linux shell emulator running entirely in the browser — virtual filesystem, SSH/SFTP, apt, and a full command set." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Virtual Shell — Web Demo" />
    <meta property="og:description" content="Scalable Linux shell emulator running entirely in the browser — virtual filesystem, SSH/SFTP, apt, and a full command set." />
    <meta property="og:url" content="https://itsrealfortune.github.io/typescript-virtual-container/demo.html" />
    <meta property="og:image" content="https://itsrealfortune.fr/avatar.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Virtual Shell — Web Demo" />
    <meta name="twitter:description" content="Scalable Linux shell emulator running entirely in the browser — virtual filesystem, SSH/SFTP, apt, and a full command set." />
    <meta name="twitter:image" content="https://itsrealfortune.fr/avatar.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        height: 100%;
        margin: 0;
      }

      body {
        display: flex;
        flex-direction: column;
        font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace;
        font-size: 14px;
        line-height: 1.5;
        background: #0b0f14;
        color: #e6eef6;
      }

      #terminal {
        flex: 1;
        overflow-y: auto;
        padding: 12px 16px;
        cursor: text;
        user-select: text;
        scrollbar-width: none;       /* Firefox */
      }

      #terminal::-webkit-scrollbar {
        display: none;               /* Chrome/Safari */
      }

      #output {
        white-space: pre-wrap;
        word-break: break-all;
        user-select: text;
      }

      #output span,
      #output .input-line {
        user-select: text;
      }

      /* Hidden input — keystroke sink only */
      #cmd {
        position: fixed;
        left: -9999px;
        opacity: 0;
        width: 1px;
        height: 1px;
        pointer-events: none;
      }

      .cursor {
        display: inline-block;
        min-width: 0.6em;
        background: #e6eef6;
        color: #0b0f14;
        animation: blink 1s step-start infinite;
        pointer-events: none;
        user-select: none;
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }
    </style>
  </head>
  <body>
    <div id="terminal">
      <div id="output"></div>
    </div>
    <input id="cmd" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
    <script type="module" src="./app.js"></script>
  </body>
</html>
